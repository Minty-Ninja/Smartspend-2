<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>SmartSpend - Home</title>
  <link rel="stylesheet" href="Hello.css">
</head>
<body>

  <div class="site-wrap">

    <header class="site-header">
      <div class="brand">
        <h1>SmartSpend</h1>
        <p class="tagline">Track expenses • Set goals • Learn smart money habits</p>
      </div>
    </header>

    <main class="content-grid">

      <!-- Expenses column (left, main) -->
      <section class="card" id="expense-section">
        <h2>Expense Tracker</h2>

        <!-- KEEP THIS FORM ID (header) -->
        <form id="header" class="form">
          <label>Amount:</label>
          <input type="number" id="Amount" placeholder="Enter amount" required />

          <label>Description:</label>
          <input type="text" id="Description" placeholder="What did you spend on?" required />

          <label>Date:</label>
          <input type="date" id="Date" required />

          <label>Category:</label>
          <select id="dropbtn">
            <option value="Food">Food</option>
            <option value="Miscellaneous">Miscellaneous</option>
            <option value="Leisure">Leisure</option>
          </select>

          <button type="submit" class="btn">Add Expense</button>
        </form>

        <div class="list">
          <h3>All Expenses</h3>
          <div id="displaydiv" class="items"></div>
        </div>
      </section>

      <!-- Goals column (right, sidebar) -->
      <aside class="card" id="goal-section">
        <h2>Goal Oriented Motivation</h2>

        <!-- KEEP THIS FORM ID (header2) -->
        <form id="header2" class="form">
          <label>Amount to Save:</label>
          <input type="number" id="AmountToSave" placeholder="Enter amount" required />

          <label>Goal Name:</label>
          <input type="text" id="DescriptionName" placeholder="e.g., Buy a PS5" required />

          <label>Completion Date:</label>
          <input type="date" id="DateCompletion" required />

          <button type="submit" class="btn">Add Goal</button>
        </form>

        <div class="list">
          <h3>All Goals</h3>
          <div id="displaydiv2" class="items"></div>
        </div>
      </aside>

    </main>

    <footer class="site-footer">
      <small>Tip: Press F12 → Console to debug. IDs must remain the same for JS to work.</small>
    </footer>
  </div>

  <script src="h.js"></script>
</body>
</html>
